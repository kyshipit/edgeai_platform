<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#555"/>
    </marker>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2c3e50"/>
      <stop offset="100%" stop-color="#1a252f"/>
    </linearGradient>
    <linearGradient id="adapterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34495e"/>
      <stop offset="100%" stop-color="#2c3e50"/>
    </linearGradient>
    <linearGradient id="hwGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#16a085"/>
      <stop offset="100%" stop-color="#1abc9c"/>
    </linearGradient>
  </defs>
  <rect width="900" height="620" fill="#f8f9fa" rx="8"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50">System Architecture</text>
<rect x="60" y="60" width="780" height="180" rx="10" fill="#adede7ff" stroke="#1a252f" stroke-width="2"/>
<text x="450" y="115" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">Main Application (Generic Framework)</text>
<rect x="100" y="140" width="200" height="70" rx="6" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
<text x="200" y="170" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">Video Capture</text>
<text x="200" y="190" text-anchor="middle" font-size="11" fill="#7f8c8d">V4L2 / RTSP Source</text>
<rect x="350" y="140" width="200" height="70" rx="6" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
<text x="450" y="170" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">Inference Scheduler</text>
<text x="450" y="190" text-anchor="middle" font-size="11" fill="#7f8c8d">Thread Pool / NPU Mgmt</text>
<rect x="600" y="140" width="200" height="70" rx="6" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
<text x="700" y="170" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">Output Render</text>
<text x="700" y="190" text-anchor="middle" font-size="11" fill="#7f8c8d">DRM Display / RTSP Output</text>
<line x1="300" y1="175" x2="345" y2="175" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="550" y1="175" x2="595" y2="175" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="60" y="255" width="780" height="35" rx="6" fill="#34495e"/>
  <text x="450" y="278" text-anchor="middle" font-size="15" font-weight="bold" fill="#ecf0f1">Adapter Layer (Plugins)</text>
  <rect x="270" y="305" width="360" height="40" rx="20" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="450" y="330" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">Abstract Adapter Interface (C++ Virtual Base)</text>
  <rect x="100" y="370" width="200" height="100" rx="6" fill="url(#adapterGrad)" stroke="#2c3e50" stroke-width="1.5"/>
  <text x="200" y="398" text-anchor="middle" font-size="14" font-weight="bold" fill="#ecf0f1">YOLO Adapter</text>
  <text x="200" y="420" text-anchor="middle" font-size="11" fill="#bdc3c7">Preprocessing: NHWC</text>
  <text x="200" y="440" text-anchor="middle" font-size="11" fill="#bdc3c7">Postprocessing: NMS</text>
  <rect x="350" y="370" width="200" height="100" rx="6" fill="url(#adapterGrad)" stroke="#2c3e50" stroke-width="1.5"/>
  <text x="450" y="398" text-anchor="middle" font-size="14" font-weight="bold" fill="#ecf0f1">ViT Adapter</text>
  <text x="450" y="420" text-anchor="middle" font-size="11" fill="#bdc3c7">Preprocessing: NCHW</text>
  <text x="450" y="440" text-anchor="middle" font-size="11" fill="#bdc3c7">Postprocessing: Top-K</text>
  <rect x="600" y="370" width="200" height="100" rx="6" fill="url(#adapterGrad)" stroke="#2c3e50" stroke-width="1.5"/>
  <text x="700" y="398" text-anchor="middle" font-size="14" font-weight="bold" fill="#ecf0f1">ResNet Adapter</text>
  <text x="700" y="420" text-anchor="middle" font-size="11" fill="#bdc3c7">Preprocessing: NCHW</text>
  <text x="700" y="440" text-anchor="middle" font-size="11" fill="#bdc3c7">Postprocessing: Top-K</text>
  <line x1="395" y1="345" x2="200" y2="368" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="345" x2="450" y2="368" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="505" y1="345" x2="700" y2="368" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="60" y="490" width="780" height="100" rx="10" fill="url(#hwGrad)" stroke="#16a085" stroke-width="2"/>
  <text x="450" y="520" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">RK3588 NPU (6 TOPS)</text>
  <text x="450" y="545" text-anchor="middle" font-size="12" fill="#ffffff">Tri-Core NPU · Linux 6.1 · NPU Driver 0.9.8</text>
  <text x="450" y="570" text-anchor="middle" font-size="11" fill="#ecf0f1">MIPI / USB Camera ──▶ RGA Hardware Preprocessing</text>
  <line x1="200" y1="470" x2="350" y2="488" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="470" x2="450" y2="488" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="700" y1="470" x2="550" y2="488" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="690" y="80" width="10" height="10" fill="#0f0217ff"/>
<text x="705" y="90" font-size="10" fill="#333">Main Layer</text>
<rect x="690" y="95" width="10" height="10" fill="#34495e"/>
<text x="705" y="105" font-size="10" fill="#333">Adapter Layer</text>
<rect x="690" y="110" width="10" height="10" fill="#16a085"/>
<text x="705" y="120" font-size="10" fill="#333">Hardware Accel</text>
</svg>
