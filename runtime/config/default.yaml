# runtime/config/default.yaml
model:
  type: yolo
  yolo:
    path: ./model/yolov5.rknn
    person_threshold_percent: 35
  scrfd:
    path: ./model/scrfd.rknn
    conf_threshold_percent: 50
    nms_threshold_percent: 50
  llm:
    enabled: true
    path: ./model/deepseek-1.5b-w8a8-rk3588.rkllm
    max_new_tokens: 64
    max_context_len: 4096
    preload_on_startup: true
    preload_on_scrfd: true
    face_stable_frames: 5
    face_absent_frames: 10
    greeting_prompt: "请用一句简短、自然的中文向镜头前的人问好，不要超过二十个字。"
    reenter_prompt: "欢迎回来，请用一句简短中文向镜头前的人问好。"
    auto_greeting_text: "您好，我是deepseek, 有什么需要可以直接和我对话"
system:
  infer_threads: 1
  npu_cores: [0, 1]
  slots:
    yolo_always_on: true
    scene_dwell_frames: 8
  switch:
    present_threshold: 30
    absent_threshold: 30
    single_thread: false
input:
  source: /dev/video-camera0
  rotate: ccw90
  width: 0
  height: 0
  show_window: true
  display:
    screen_width: 1080
    screen_height: 1920
    max_screen_ratio_percent: 85
    fullscreen: false
    title_bar_reserve_px: 56
